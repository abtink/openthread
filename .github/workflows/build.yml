name: Build

on: [push, pull_request]

jobs:

  cancel-previous-runs:
    runs-on: ubuntu-latest
    steps:
    - uses: rokroskar/workflow-run-cleanup-action@master
      env:
        GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      if: "github.ref != 'refs/heads/master'"

  pretty:
    runs-on: ubuntu-18.04
    steps:
    - uses: actions/checkout@v2
    - name: Bootstrap
      run: |
        sudo apt update
        sudo apt remove -y clang-6.0 libclang-common-6.0-dev libclang1-6.0 libllvm6.0
        sudo apt autoremove
        sudo apt --no-install-recommends install -y clang-tools clang-format-6.0
        clang-format-6.0 --version
        python3 -m pip install yapf==0.29.0
    - name: Check
      run: |
        script/make-pretty check

  macos:
    runs-on: macos-10.15
    env:
      CC: clang
      CXX: clang++
    steps:
    - uses: actions/checkout@v2
    - name: Bootstrap
      run: |
        brew install automake ninja llvm
    - name: Build
      run: |
        script/check-posix-build
        script/check-simulation-build

  clang-m32:
    name: clang-m32-${{ matrix.clang_ver }}
    runs-on: ubuntu-18.04
    strategy:
      matrix:
        clang_ver: [9]
    env:
      CC: clang-${{ matrix.clang_ver }}
      CXX: clang++-${{ matrix.clang_ver }}
      CFLAGS: -m32 -Wconversion
      CXXFLAGS: -m32 -Wconversion
      LDFLAGS: -m32
    steps:
      - uses: actions/checkout@v2
      - name: Bootstrap
        run: |
          sudo apt update
          sudo apt --no-install-recommends install -y clang-${{ matrix.clang_ver }} clang++-${{ matrix.clang_ver }} g++-multilib gcc-multilib ninja-build
          sudo apt --no-install-recommends install -y gcc-7 g++-7
      - name: Build
        run: |
          script/check-simulation-build

